name: build-certification

on:
  push:
    branches:
      - master
      - "feature/**"
  pull_request:
    branches:
      - master

jobs:
  certification:
    name: HTTP + E2E + Lint + Typecheck + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ns_fiscal_cloud_test
          POSTGRES_USER: ns_fiscal_app
          # Ephemeral CI-only secret; not reused locally and not loaded from .env.test.
          POSTGRES_PASSWORD: ci-ephemeral-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ns_fiscal_app -d ns_fiscal_cloud_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      DATABASE_URL_TEST: postgresql://ns_fiscal_app:ci-ephemeral-postgres-password@localhost:5432/ns_fiscal_cloud_test?schema=public
      DATABASE_URL: postgresql://ns_fiscal_app:ci-ephemeral-postgres-password@localhost:5432/ns_fiscal_cloud_test?schema=public
      REDIS_DISABLED: "true"
      REDIS_URL: redis://127.0.0.1:6399
      SEFAZ_INTEGRATION_ENABLED: "false"
      SEFAZ_MANIFESTATION_ENABLED: "false"
      CTE_INTEGRATION_ENABLED: "false"
      ALLOW_PRODUCTION_SEFAZ: "false"
      SEFAZ_ENVIRONMENT: homologation
      SEFAZ_DIST_DFE_PROD_URL: https://test.invalid/sefaz-dist-prod
      SEFAZ_DIST_DFE_HOM_URL: https://test.invalid/sefaz-dist-hom
      SEFAZ_EVENT_PROD_URL: https://test.invalid/sefaz-event-prod
      SEFAZ_EVENT_HOM_URL: https://test.invalid/sefaz-event-hom
      CTEDIST_DFE_PROD_URL: ""
      CTE_DIST_DFE_HOM_URL: ""
      CORS_ORIGIN: http://127.0.0.1:3000
      LOG_LEVEL: error
      JWT_SECRET: ci-ephemeral-jwt-secret-with-at-least-32-characters
      JWT_EXPIRES_IN: 1h
      CERT_ENCRYPTION_KEY: ci-ephemeral-cert-encryption-key-32chars
      UPLOAD_MAX_SIZE_MB: "8"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter @ns-fiscal/api-js prisma:validate

      - name: Prisma generate
        run: pnpm --filter @ns-fiscal/api-js prisma:generate

      - name: Migrate test database
        run: pnpm --filter @ns-fiscal/api-js test:db:migrate

      - name: Preflight E2E
        run: pnpm --filter @ns-fiscal/api-js preflight:e2e

      - name: Test (unit + e2e fiscal exports)
        run: pnpm --filter @ns-fiscal/api-js test

      - name: Test HTTP
        run: pnpm --filter @ns-fiscal/api-js test:http

      - name: Test E2E (run 1)
        run: pnpm --filter @ns-fiscal/api-js test:e2e

      - name: Test E2E (run 2)
        run: pnpm --filter @ns-fiscal/api-js test:e2e

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Verify BUILD_ID
        run: test -s apps/web/.next/BUILD_ID
